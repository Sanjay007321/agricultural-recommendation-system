<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold text-center mb-6">Login Test</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                <input type="text" id="mobile" value="9998887777" class="w-full p-2 border rounded">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" value="password123" class="w-full p-2 border rounded">
            </div>
            
            <button onclick="testLogin()" class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">
                Test Login
            </button>
        </div>
        
        <div id="results" class="mt-6 p-4 bg-gray-50 rounded text-sm font-mono whitespace-pre-wrap"></div>
    </div>

    <script>
        async function testLogin() {
            const results = document.getElementById('results');
            results.textContent = 'Testing login...\n';
            
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            
            const loginData = {
                mobile: mobile,
                password: password
            };
            
            results.textContent += `Sending data: ${JSON.stringify(loginData)}\n\n`;
            
            try {
                // Test direct backend connection
                results.textContent += '1. Testing direct backend connection...\n';
                const backendResponse = await fetch('http://localhost:8001/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });
                
                results.textContent += `Backend response status: ${backendResponse.status}\n`;
                
                if (backendResponse.ok) {
                    const backendData = await backendResponse.json();
                    results.textContent += `Backend success: ${JSON.stringify(backendData, null, 2)}\n\n`;
                } else {
                    const errorText = await backendResponse.text();
                    results.textContent += `Backend error: ${errorText}\n\n`;
                }
                
                // Test frontend proxy connection
                results.textContent += '2. Testing frontend proxy connection...\n';
                const proxyResponse = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });
                
                results.textContent += `Proxy response status: ${proxyResponse.status}\n`;
                
                if (proxyResponse.ok) {
                    const proxyData = await proxyResponse.json();
                    results.textContent += `Proxy success: ${JSON.stringify(proxyData, null, 2)}\n`;
                } else {
                    const errorText = await proxyResponse.text();
                    results.textContent += `Proxy error: ${errorText}\n`;
                }
                
            } catch (error) {
                results.textContent += `Error: ${error.message}\n`;
            }
        }
    </script>
</body>
</html>
